spring:
  application:
    name: booking-service

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_service_db
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # RabbitMQ Configuration (nhận event từ car-management)
  # Disable auto-connection nếu RabbitMQ chưa chạy
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # Không fail startup nếu RabbitMQ chưa sẵn sàng
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Server Configuration
server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    com.crs.bookingservice: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ============================================================
# OpenFeign — URLs của các services khác
# ============================================================
feign:
  clients:
    iam-service:
      url: http://localhost:8080
    car-management-service:
      url: http://localhost:8081
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: BASIC
